<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Hệ Thống Quản Lý User</h2>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h4>Tạo User Mới</h4>
                    <form id="createUserForm">
                        <div class="mb-2">
                            <input type="text" id="c_username" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-2">
                            <input type="password" id="c_password" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="mb-2">
                            <input type="email" id="c_email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="c_fullname" class="form-control" placeholder="Full Name">
                        </div>
                        <button type="submit" class="btn btn-primary">Tạo User</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h4>Bật / Tắt Trạng Thái (Enable/Disable)</h4>
                    <form id="statusForm">
                        <div class="mb-2">
                            <input type="text" id="s_username" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-2">
                            <input type="email" id="s_email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-success" onclick="updateStatus('/enable')">Enable</button>
                            <button type="button" class="btn btn-warning" onclick="updateStatus('/disable')">Disable</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h4>Danh sách User</h4>
                <button class="btn btn-secondary" onclick="fetchUsers()">Làm mới danh sách</button>
            </div>
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Full Name</th>
                        <th>Status</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('c_username').value,
                password: document.getElementById('c_password').value,
                email: document.getElementById('c_email').value,
                fullName: document.getElementById('c_fullname').value
            };

            try {
                const res = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert('Tạo user thành công!');
                    e.target.reset();
                    fetchUsers();
                } else {
                    const data = await res.json();
                    alert('Lỗi: ' + data.error);
                }
            } catch (error) {
                alert('Lỗi kết nối server');
            }
        });

        async function updateStatus(endpoint) {
            const payload = {
                username: document.getElementById('s_username').value,
                email: document.getElementById('s_email').value
            };

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    fetchUsers();
                } else {
                    alert('Lỗi: ' + data.message);
                }
            } catch (error) {
                alert('Lỗi kết nối server');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa (soft delete) user này?')) return;
            try {
                const res = await fetch(`${API_URL}/users/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchUsers();
                }
            } catch (error) {
                alert('Lỗi khi xóa');
            }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/users`);
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                
                users.forEach(user => {
                    const statusText = user.status ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-danger">Inactive</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>${user.fullName}</td>
                            <td>${statusText}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser('${user._id}')">Xóa</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Lỗi khi tải danh sách', error);
            }
        }

        fetchUsers();
    </script>
</body>
</html>
